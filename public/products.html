<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - ABD Sports Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
  <aside class="sidebar">
    <div class="logo">
      <h2>ABD Sports</h2>
    </div>
    <nav>
      <ul class="nav-list">
        <li class="nav-item">
          <a href="dashboard.html" class="nav-link">
            <span class="nav-icon icon-dashboard"></span>
            Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a href="products.html" class="nav-link active">
            <span class="nav-icon icon-products"></span>
            Products
          </a>
        </li>
        <li class="nav-item">
          <a href="enquiries.html" class="nav-link">
            <span class="nav-icon icon-enquiries"></span>
            Enquiries
          </a>
        </li>
        <li class="nav-item">
          <a href="custom-jerseys.html" class="nav-link">
            <span class="nav-icon icon-jers


      </ul>
    </nav>
  </aside>

  <main class="main-content">
    <header class="header">
      <div>
        <h1 style="font-size: 2rem; font-weight: 700; color: var(--text);">Products Management</h1>
        <p style="color: var(--text-light);">Control your entire product catalog with full business features</p>
      </div>
      <div class="user-actions">
        <div class="profile" id="logoutBtn">
          <div class="avatar">A</div>
          <span>Admin</span>
        </div>
      </div>
    </header>

<div class="table-header">
      <div class="table-controls">
        <input type="text" id="productsSearch" placeholder="Search products, SKU, category..." style="width: 300px;">
        <select id="categoryFilter">
          <option value="">All Categories</option>
          <option value="Cricket">Cricket</option>
          <option value="Football">Football</option>
          <option value="Jerseys">Jerseys</option>
          <option value="Accessories">Accessories</option>
        </select>
        <span id="resultsCount" style="margin-left: auto; color: var(--text-light);">0 products</span>
      </div>
      <button id="addProductBtn" class="cta-button" style="background: linear-gradient(135deg, var(--success), #20c997);">
        Add New Product
      </button>
    </div>

    <div class="table-container">
      <table class="table" id="productsTable">
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="products-container">
          <!-- Dynamic content -->
        </tbody>
      </table>
    </div>
  </main>

  <!-- Product Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add New Product</h2>
      </div>
      <form id="productForm">
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label>Product Name</label>
              <input type="text" name="name" required>
            </div>
            <div class="form-group">
              <label>SKU</label>
              <input type="text" name="sku" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Category</label>
              <select name="category" required>
                <option value="">Select Category</option>
                <option value="Cricket">Cricket</option>
                <option value="Football">Football</option>
                <option value="Jerseys">Jerseys</option>
                <option value="Accessories">Accessories</option>
              </select>
            </div>
            <div class="form-group">
              <label>Price (₹)</label>
              <input type="number" name="price" step="0.01" required>
            </div>
          </div>
        <div class="form-row">
            <div class="form-group">
              <label>Image</label>
              <input type="file" name="image" id="productImage" accept="image/*">
              <div id="imagePreview" style="margin-top: 10px;"></div>
            </div>
            <div class="form-group">
              <label>Discount Price (₹)</label>
              <input type="number" name="discountPrice" step="0.01">
            </div>
          </div>
          <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" name="stock" required>
          </div>
          <div class="form-group full">
            <label>Description</label>
            <textarea name="description" rows="4" placeholder="Detailed product description..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Featured</label>
              <label class="switch">
                <input type="checkbox" name="featured">
                <span class="slider"></span>
              </label>
            </div>
            <div class="form-group">
              <label>Visible</label>
              <label class="switch">
                <input type="checkbox" name="visible" checked>
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn" onclick="hideModal('productModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script>initProducts();</script>
</body>
</html>
