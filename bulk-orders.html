<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk Orders - ABD Sports Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
  <aside class="sidebar">
    <div class="logo">
      <h2>ABD Sports</h2>
    </div>
    <nav>
      <ul class="nav-list">
        <li class="nav-item"><a href="dashboard.html" class="nav-link"><span class="nav-icon icon-dashboard"></span>Dashboard</a></li>
        <li class="nav-item"><a href="products.html" class="nav-link"><span class="nav-icon icon-products"></span>Products</a></li>
        <li class="nav-item"><a href="enquiries.html" class="nav-link"><span class="nav-icon icon-enquiries"></span>Enquiries</a></li>
        <li class="nav-item"><a href="custom-jerseys.html" class="nav-link"><span class="nav-icon icon-jerseys"></span>Custom Jerseys</a></li>
        <li class="nav-item"><a href="bulk-orders.html" class="nav-link active"><span class="nav-icon icon-bulk"></span>Bulk Orders</a></li>
        <li class="nav-item"><a href="promotions.html" class="nav-link"><span class="nav-icon icon-promotions"></span>Promotions</a></li>
        <li class="nav-item"><a href="settings.html" class="nav-link"><span class="nav-icon icon-settings"></span>Settings</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">
    <header class="header">
      <div>
        <h1 style="font-size: 2rem; font-weight: 700; color: var(--text);">Bulk School & Academy Orders</h1>
        <p style="color: var(--text-light);">Manage high-volume orders from institutions and teams</p>
      </div>
      <div class="user-actions">
        <div class="profile" id="logoutBtn">
          <div class="avatar">A</div>
          <span>Admin</span>
        </div>
      </div>
    </header>

    <div class="table-container">
      <table class="table">
        <thead>
          <tr>
            <th>Institution</th>
            <th>Products</th>
            <th>Total Qty</th>
            <th>Value (₹)</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="bulk-container">
          <!-- Dynamic -->
        </tbody>
      </table>
    </div>
  </main>

  <script src="script.js"></script>
  <script>initBulkOrders();</script>
</body>
</html>
