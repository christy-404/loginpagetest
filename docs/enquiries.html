<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiries - ABD Sports Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
  <aside class="sidebar">
    <div class="logo">
      <h2>ABD Sports</h2>
    </div>
    <nav>
      <ul class="nav-list">
        <li class="nav-item"><a href="dashboard.html" class="nav-link"><span class="nav-icon icon-dashboard"></span>Dashboard</a></li>
        <li class="nav-item"><a href="products.html" class="nav-link"><span class="nav-icon icon-products"></span>Products</a></li>
        <li class="nav-item"><a href="enquiries.html" class="nav-link active"><span class="nav-icon icon-enquiries"></span>Enquiries</a></li>
        <li class="nav-item"><a href="custom-jerseys.html" class="nav-link"><span class="nav-icon icon-jerseys"></span>Custom Jerseys</a></li>
        <li class="nav-item"><a href="bulk-orders.html" class="nav-link"><span class="nav-icon icon-bulk"></span>Bulk Orders</a></li>
        <li class="nav-item"><a href="promotions.html" class="nav-link"><span class="nav-icon icon-promotions"></span>Promotions</a></li>
        <li class="nav-item"><a href="settings.html" class="nav-link"><span class="nav-icon icon-settings"></span>Settings</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">
    <header class="header">
      <div>
        <h1 style="font-size: 2rem; font-weight: 700; color: var(--text);">Enquiries Management</h1>
        <p style="color: var(--text-light);">Track customer leads and convert enquiries to sales</p>
      </div>
      <div class="user-actions">
        <div class="profile" id="logoutBtn">
          <div class="avatar">A</div>
          <span>Admin</span>
        </div>
      </div>
    </header>

    <div class="table-container">
      <table class="table" id="enquiriesTable">
        <thead>
          <tr>
            <th>Customer</th>
            <th>Phone</th>
            <th>Interest</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="enquiries-container">
          <!-- Dynamic -->
        </tbody>
      </table>
    </div>
  </main>

  <!-- Status Modal -->
  <div id="statusModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Update Status</h2>
      </div>
      <form id="statusForm">
        <div class="modal-body">
          <div class="form-group">
            <label>Status</label>
            <select name="status" required>
              <option value="pending">Pending</option>
              <option value="contacted">Contacted</option>
              <option value="followed-up">Followed Up</option>
              <option value="closed">Closed</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Notes</label>
            <textarea name="notes" rows="4" placeholder="Follow-up notes, next action..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn" onclick="hideModal('statusModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Update Status</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script>initEnquiries();</script>
</body>
</html>
